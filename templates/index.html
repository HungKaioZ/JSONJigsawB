<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jigsaw Worldgen Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1><i class="fas fa-puzzle-piece"></i> Jigsaw Structure Generator</h1>
            <p>Tạo file worldgen cho cấu trúc Jigsaw trong Minecraft Bedrock</p>
        </header>

        <div class="wizard-tabs">
            <button class="tab-btn active" data-tab="tab1">1. Cấu hình chính</button>
            <button class="tab-btn" data-tab="tab2">2. Mảnh ghép (Template Pools)</button>
            <button class="tab-btn" data-tab="tab3">3. Tùy chọn nâng cao</button>
        </div>

        <form id="generator-form">
            <!-- TAB 1: CẤU HÌNH CHÍNH -->
            <div id="tab1" class="tab-content active">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Namespace <i class="fas fa-info-circle tooltip-icon" data-tooltip="Định danh duy nhất, ví dụ: myaddon"></i></label>
                        <input type="text" name="namespace" required placeholder="myaddon">
                    </div>
                    <div class="form-group">
                        <label>Tên cấu trúc <i class="fas fa-info-circle tooltip-icon" data-tooltip="Dùng trong /locate và /place"></i></label>
                        <input type="text" name="struct_name" required placeholder="my_dungeon">
                    </div>
                    <div class="form-group">
                        <label>Step <i class="fas fa-info-circle tooltip-icon" data-tooltip="Giai đoạn sinh thế giới"></i></label>
                        <select name="step">
                            <option value="surface_structures" selected>surface_structures</option>
                            <option value="underground_structures">underground_structures</option>
                            <option value="strongholds">strongholds</option>
                            <option value="raw_generation">raw_generation</option>
                            <option value="lakes">lakes</option>
                            <option value="local_modifications">local_modifications</option>
                            <option value="underground_ores">underground_ores</option>
                            <option value="underground_decoration">underground_decoration</option>
                            <option value="fluid_springs">fluid_springs</option>
                            <option value="vegetal_decoration">vegetal_decoration</option>
                            <option value="top_layer_modification">top_layer_modification</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Terrain Adaptation</label>
                        <select name="terrain_adaptation">
                            <option value="beard_thin" selected>beard_thin</option>
                            <option value="none">none</option>
                            <option value="bury">bury</option>
                            <option value="beard_box">beard_box</option>
                            <option value="encapsulate">encapsulate</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Max Depth <i class="fas fa-info-circle tooltip-icon" data-tooltip="0-20, số lần mở rộng"></i></label>
                        <input type="number" name="max_depth" value="10" min="0" max="20" step="1">
                        <span class="validation-error" data-for="max_depth"></span>
                    </div>
                    <div class="form-group">
                        <label>Start Jigsaw Name <i class="fas fa-info-circle tooltip-icon" data-tooltip="Điểm neo, giúp tránh lệch"></i></label>
                        <input type="text" name="start_jigsaw_name" placeholder="dungeon_connector">
                    </div>
                    <div class="form-group">
                        <label>Heightmap Projection</label>
                        <select name="heightmap_projection">
                            <option value="world_surface" selected>world_surface</option>
                            <option value="ocean_floor">ocean_floor</option>
                            <option value="none">none</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Biome Tag <i class="fas fa-info-circle tooltip-icon" data-tooltip="Cấu trúc chỉ sinh trong biome có tag này"></i></label>
                        <input type="text" name="biome_tag" value="plains">
                    </div>
                </div>

                <div class="form-section">
                    <h3>Start Height <i class="fas fa-info-circle tooltip-icon" data-tooltip="Độ cao bắt đầu sinh cấu trúc"></i></h3>
                    <div class="radio-group">
                        <label><input type="radio" name="start_height_type" value="constant" checked> Constant</label>
                        <label><input type="radio" name="start_height_type" value="uniform"> Uniform</label>
                    </div>
                    <div id="constant-height" class="height-fields">
                        <div class="inline-group">
                            <select name="start_height_anchor_type">
                                <option value="absolute">absolute</option>
                                <option value="above_bottom">above_bottom</option>
                                <option value="below_top">below_top</option>
                                <option value="from_sea">from_sea</option>
                            </select>
                            <input type="number" name="start_height_anchor_value" value="64">
                        </div>
                    </div>
                    <div id="uniform-height" class="height-fields" style="display: none;">
                        <div class="inline-group">
                            <span>Min:</span>
                            <select name="start_height_min_type">
                                <option value="absolute">absolute</option>
                                <option value="above_bottom">above_bottom</option>
                                <option value="below_top">below_top</option>
                                <option value="from_sea">from_sea</option>
                            </select>
                            <input type="number" name="start_height_min_value" value="50">
                        </div>
                        <div class="inline-group">
                            <span>Max:</span>
                            <select name="start_height_max_type">
                                <option value="absolute">absolute</option>
                                <option value="above_bottom">above_bottom</option>
                                <option value="below_top">below_top</option>
                                <option value="from_sea">from_sea</option>
                            </select>
                            <input type="number" name="start_height_max_value" value="80">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Kích thước & Giới hạn</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Max Distance (horizontal)</label>
                            <input type="number" name="max_distance_h" value="80" min="1" max="128">
                        </div>
                        <div class="form-group">
                            <label>Max Distance (vertical)</label>
                            <input type="number" name="max_distance_v" value="80" min="1">
                        </div>
                        <div class="form-group">
                            <label>Dimension Padding (top)</label>
                            <input type="number" name="dim_padding_top" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>Dimension Padding (bottom)</label>
                            <input type="number" name="dim_padding_bottom" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>Liquid Settings</label>
                            <select name="liquid_settings">
                                <option value="apply_waterlogging">apply_waterlogging</option>
                                <option value="ignore_waterlogging">ignore_waterlogging</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB 2: TEMPLATE POOLS -->
            <div id="tab2" class="tab-content">
                <div class="pool-tabs">
                    <button type="button" class="pool-tab-btn active" data-pool="main">Main Pool</button>
                    <button type="button" class="pool-tab-btn" data-pool="fallback">Fallback Pool</button>
                </div>

                <!-- Main Pool -->
                <div id="main-pool" class="pool-content active">
                    <div class="form-group">
                        <label>Pool ID <i class="fas fa-info-circle tooltip-icon" data-tooltip="Để trống sẽ tự tạo theo namespace:struct_name_pool"></i></label>
                        <input type="text" name="pool_id" placeholder="myaddon:my_dungeon_pool">
                    </div>
                    <div class="elements-list" id="main-elements">
                        <div class="element-item">
                            <input type="text" class="location" placeholder="Location (vd: ruin/hallway)" required>
                            <input type="number" class="weight" placeholder="Weight (1-200)" value="1" min="1" max="200">
                            <input type="text" class="processors" placeholder="Processor ID (vd: minecraft:empty)">
                            <select class="projection">
                                <option value="rigid">rigid</option>
                                <option value="terrain_matching">terrain_matching</option>
                            </select>
                            <button type="button" class="remove-element-btn"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                    <button type="button" class="add-element-btn"><i class="fas fa-plus"></i> Thêm element</button>
                </div>

                <!-- Fallback Pool (ẩn nếu chưa có ID) -->
                <div id="fallback-pool" class="pool-content">
                    <div class="form-group">
                        <label>Fallback Pool ID <i class="fas fa-info-circle tooltip-icon" data-tooltip="Nhập để kích hoạt fallback pool"></i></label>
                        <input type="text" name="fallback_pool_id" placeholder="myaddon:dead_ends">
                    </div>
                    <div class="elements-list" id="fallback-elements">
                        <div class="element-item">
                            <input type="text" class="location" placeholder="Location">
                            <input type="number" class="weight" placeholder="Weight" value="1" min="1" max="200">
                            <input type="text" class="processors" placeholder="Processor ID">
                            <select class="projection">
                                <option value="rigid">rigid</option>
                                <option value="terrain_matching">terrain_matching</option>
                            </select>
                            <button type="button" class="remove-element-btn"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                    <button type="button" class="add-element-btn"><i class="fas fa-plus"></i> Thêm element</button>
                </div>
            </div>

            <!-- TAB 3: NÂNG CAO -->
            <div id="tab3" class="tab-content">
                <div class="form-section">
                    <h3>Structure Set</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Spacing (chunks)</label>
                            <input type="number" name="spacing" value="32" min="1">
                        </div>
                        <div class="form-group">
                            <label>Separation (chunks)</label>
                            <input type="number" name="separation" value="16" min="1">
                            <span class="validation-error" data-for="separation"></span>
                        </div>
                        <div class="form-group">
                            <label>Salt <i class="fas fa-info-circle tooltip-icon" data-tooltip="Để trống tự sinh ngẫu nhiên"></i></label>
                            <input type="number" name="salt">
                            <button type="button" id="random-salt" class="small-btn">Random</button>
                        </div>
                        <div class="form-group">
                            <label>Spread Type</label>
                            <select name="spread_type">
                                <option value="linear">linear</option>
                                <option value="triangular">triangular</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Pool Aliases <i class="fas fa-info-circle tooltip-icon" data-tooltip="Dùng để tạo theme cho cấu trúc"></i></h3>
                    <div id="pool-aliases-list"></div>
                    <button type="button" id="add-pool-alias" class="small-btn"><i class="fas fa-plus"></i> Thêm Pool Alias</button>
                </div>

                <div class="form-section">
                    <h3>Processors <i class="fas fa-info-circle tooltip-icon" data-tooltip="Thay đổi block khi đặt cấu trúc"></i></h3>
                    <div id="processors-list"></div>
                    <button type="button" id="add-processor" class="small-btn"><i class="fas fa-plus"></i> Thêm Processor List</button>
                    <details>
                        <summary>Hoặc nhập trực tiếp JSON</summary>
                        <textarea id="processors-json" rows="6" placeholder='[{"identifier":"myaddon:my_processor","processors":[{"processor_type":"minecraft:rule","rules":[...]}]}]'></textarea>
                    </details>
                </div>
            </div>

            <div class="action-bar">
                <button type="submit" class="generate-btn"><i class="fas fa-download"></i> Tạo file và tải về</button>
                <button type="button" id="reset-btn" class="reset-btn"><i class="fas fa-undo-alt"></i> Reset</button>
            </div>
            <div id="loading" style="display:none;"><i class="fas fa-spinner fa-pulse"></i> Đang xử lý...</div>
            <div id="error" class="error-message"></div>
        </form>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
